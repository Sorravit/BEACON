# Grafana Tempo configuration — BEACON tracing backend
# Trace backend for BEACON — receives spans from the OTel Collector
#
# Tempo receives traces from the OTel Collector via OTLP/gRPC (port 4317)
# and exposes its query HTTP API on port 3200 for Grafana datasource.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m     # flush blocks to storage every 5 minutes

compactor:
  compaction:
    block_retention: 48h     # keep traces for 48 hours in dev

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: beacon-local
  storage:
    path: /var/tempo/generator/wal
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
      generate_native_histograms: both
