# Beacon Docker Compose
services:

  tempo:
    image: grafana/tempo:2.8.0
    container_name: beacon-tempo
    user: "0"
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.2
    container_name: beacon-loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: beacon-prometheus
    command:
      - --enable-feature=exemplar-storage
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: beacon-otel-collector
    command: [ "--config=/etc/otel-config.yaml" ]
    volumes:
      - ./docker/otel-config.yaml:/etc/otel-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - loki
      - tempo
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.2
    container_name: beacon-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_NEWS_NEWS_FEED_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    depends_on:
      - tempo
      - loki
      - prometheus
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: weaviate
    ports:
      - "${WEAVIATE_PORT:-8090}:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DISK_USE_WARNING_PERCENTAGE: "95"
      DISK_USE_READONLY_PERCENTAGE: "99"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tempo-data:
