services:
  # ---------------------------------------------------------------------------
  # Grafana Tempo — distributed trace backend (replaced Jaeger)
  # Receives OTLP/gRPC traces from otel-collector on port 4317.
  # Exposes HTTP query API on port 3200 (add as Tempo datasource in Grafana).
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.5.0
    container_name: beacon-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API / Grafana datasource
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: beacon-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes: ["./otel-collector-config.yml:/etc/otel-collector-config.yml:ro"]
    ports: ["4317:4317", "4318:4318", "8888:8888"]
    depends_on:
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: beacon-prometheus
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9091:9090"]
    restart: unless-stopped

volumes:
  tempo-data:
    driver: local
