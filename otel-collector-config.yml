receivers:
  otlp:
    protocols:
      grpc: {endpoint: 0.0.0.0:4317}
      http: {endpoint: 0.0.0.0:4318}

processors:
  batch: {timeout: 1s, send_batch_size: 1024}

exporters:
  # Grafana Tempo — receives traces via OTLP/gRPC
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Prometheus — scrapes metrics exposed on :8888 (matches prometheus.yml)
  prometheus:
    endpoint: "0.0.0.0:8888"
    namespace: beacon
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:  {receivers: [otlp], processors: [batch], exporters: [otlp/tempo]}
    metrics: {receivers: [otlp], processors: [batch], exporters: [prometheus]}
