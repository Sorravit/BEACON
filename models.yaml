# =============================================================================
# BEACON — Curated Model Registry
# =============================================================================
# This file is the single source of truth for which models BEACON can use.
# It is read at startup (no network calls) so the model set is predictable and
# works offline. Edit this file to add/remove models or change role defaults,
# then restart the server (or call POST /models/reload).
#
# Each model entry:
#   id          (required)  exact model identifier passed to the API
#   label       (required)  human-friendly name shown in the UI
#   description (optional)  short note about strengths / when to use
#   context     (optional)  context window in tokens (informational)
#   tags        (optional)  free-form labels, e.g. [fast, reasoning, vision]
#
# `default` is the global fallback model.
# `roles` assigns a default model to each agent role used by orchestration and
# chat. Any role may be overridden per-request from the UI/API.
# =============================================================================

default: global/anthropic.claude-sonnet-4-6

roles:
  chat:         global/anthropic.claude-sonnet-4-6
  orchestrator: global/anthropic.claude-sonnet-4-6
  researcher:   global/gpt-5.1-chat
  planner:      global/anthropic.claude-sonnet-4-6
  engineer:     global/anthropic.claude-sonnet-4-6
  devops:       global/anthropic.claude-sonnet-4-6
  verifier:     global/anthropic.claude-sonnet-4-5-20250929-v1:0
  titler:       global/ibm/granite-4-h-small

models:
  - id: global/anthropic.claude-sonnet-4-6
    label: Claude Sonnet 4.6
    description: Primary general-purpose model — strong reasoning, coding and tool use.
    context: 200000
    tags: [default, reasoning, coding, agentic]

  - id: global/anthropic.claude-sonnet-4-5-20250929-v1:0
    label: Claude Sonnet 4.5
    description: Previous Sonnet generation — reliable for QA/verification.
    context: 200000
    tags: [reasoning, coding]

  - id: global/claude-3-7-sonnet-1
    label: Claude 3.7 Sonnet
    description: Balanced quality and speed for general chat.
    context: 200000
    tags: [reasoning]

  - id: global/gpt-5.1-chat
    label: GPT-5.1 Chat
    description: Strong research and synthesis; good for gathering and summarising.
    context: 128000
    tags: [research, reasoning]

  - id: global/o3-mini
    label: o3-mini
    description: Compact reasoning model — fast step-by-step planning.
    context: 128000
    tags: [fast, reasoning]

  - id: global/ibm/granite-4-h-small
    label: Granite 4 H Small
    description: Lightweight IBM model — fast for titles, classification, cheap calls.
    context: 32000
    tags: [fast, cheap]

  - id: global/meta-llama/llama-3-3-70b-instruct
    label: Llama 3.3 70B Instruct
    description: Open-weight instruct model — solid general assistant.
    context: 128000
    tags: [open]

  - id: global/mistralai/mistral-medium-2505
    label: Mistral Medium 2505
    description: Efficient general-purpose model from Mistral.
    context: 128000
    tags: [open, fast]

